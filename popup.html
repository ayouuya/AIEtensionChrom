<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Darija Translator Settings</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e4e4e7;
      width: 400px;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    header {
      text-align: center;
      padding-bottom: 14px;
      border-bottom: 1px solid #374151;
    }

    header h1 {
      font-size: 1.2rem;
      color: #60a5fa;
      margin-bottom: 4px;
    }

    header p {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 0.85rem;
      font-weight: 500;
      color: #d1d5db;
    }

    input, select {
      width: 100%;
      padding: 9px 12px;
      border: 1px solid #374151;
      border-radius: 6px;
      background: #1f2937;
      color: #e4e4e7;
      font-size: 0.85rem;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #60a5fa;
      box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
    }

    input::placeholder {
      color: #6b7280;
    }

    .btn {
      width: 100%;
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 0.9rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
    }

    .btn-primary {
      background: linear-gradient(135deg, #3b82f6 0%, #2563eb 100%);
      color: white;
    }

    .btn-primary:hover {
      background: linear-gradient(135deg, #2563eb 0%, #1d4ed8 100%);
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      font-size: 0.85rem;
      text-align: center;
      display: none;
    }

    .status.success {
      display: block;
      background: rgba(34, 197, 94, 0.1);
      border: 1px solid rgba(34, 197, 94, 0.3);
      color: #4ade80;
    }

    .status.error {
      display: block;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #fca5a5;
    }

    .help-text {
      font-size: 0.7rem;
      color: #6b7280;
      line-height: 1.3;
    }

    .btn-secondary {
      background: #374151;
      color: #e4e4e7;
      margin-top: 4px;
    }

    .btn-secondary:hover {
      background: #4b5563;
    }

    .presets {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }

    .preset-btn {
      padding: 6px 10px;
      font-size: 0.75rem;
      border: 1px solid #374151;
      border-radius: 4px;
      background: #1f2937;
      color: #9ca3af;
      cursor: pointer;
      transition: all 0.2s;
    }

    .preset-btn:hover {
      border-color: #60a5fa;
      color: #60a5fa;
    }

    .current-config {
      font-size: 0.75rem;
      color: #9ca3af;
      padding: 8px;
      background: #1f2937;
      border-radius: 4px;
      word-break: break-all;
      line-height: 1.4;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>Darija Translator</h1>
      <p>Configure API Settings</p>
    </header>

    <div class="form-group">
      <label>Quick Presets</label>
      <div class="presets">
        <button class="preset-btn" data-preset="claude">Claude</button>
        <button class="preset-btn" data-preset="openai">OpenAI</button>
        <button class="preset-btn" data-preset="openrouter">OpenRouter</button>
        <button class="preset-btn" data-preset="gemini">Gemini</button>
      </div>
    </div>

    <div class="form-group">
      <label for="apiUrl">API URL</label>
      <input
        type="text"
        id="apiUrl"
        placeholder="https://api.anthropic.com/v1/messages"
      />
    </div>

    <div class="form-group">
      <label for="apiKey">API Key</label>
      <input
        type="password"
        id="apiKey"
        placeholder="Your API key..."
      />
    </div>

    <div class="form-group">
      <label for="modelName">Model Name</label>
      <input
        type="text"
        id="modelName"
        placeholder="e.g., claude-3-haiku-20240307"
      />
    </div>

    <div id="currentConfigSection" style="display: none;">
      <label>Current Configuration</label>
      <div class="current-config" id="currentConfig"></div>
    </div>

    <button id="saveBtn" class="btn btn-primary">Save Settings</button>
    <button id="clearBtn" class="btn btn-secondary" style="display: none;">Clear Settings</button>

    <div id="status" class="status"></div>

    <div class="help-text">
      <strong>API URLs:</strong><br>
      Claude: https://api.anthropic.com/v1/messages<br>
      OpenAI: https://api.openai.com/v1/chat/completions<br>
      OpenRouter: https://openrouter.ai/api/v1/chat/completions<br>
      Gemini: https://generativelanguage.googleapis.com/v1beta/models/{model}:generateContent
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
